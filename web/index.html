<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentCall</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">AgentCall</div>
      <div class="session-tabs" id="sessionTabs"></div>
      <form class="launcher" id="launcher">
        <input id="sessionName" value="ps1" aria-label="session name">
        <input id="sessionCommand" value="powershell.exe -NoLogo" aria-label="command">
        <button>start</button>
      </form>
    </header>
    <section class="pane-grid" id="paneGrid"></section>
  </main>
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/fit-addon.js"></script>
  <script src="/app.js"></script>
</body>
</html>
